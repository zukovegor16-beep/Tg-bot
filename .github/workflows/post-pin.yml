name: Финальная витрина (зелёная кнопка + анимация)

on:
  workflow_dispatch:

jobs:
  send-and-pin:
    runs-on: ubuntu-latest
    steps:
      - name: Отправка и закрепление
        env:
          RAW_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          RAW_CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          python3 << 'PYEOF'
          import os, json, urllib.request, sys

          TOKEN = os.environ["RAW_TOKEN"].strip()
          CHAT_ID = os.environ["RAW_CHAT_ID"].strip()
          BASE = f"https://api.telegram.org/bot{TOKEN}"

          text = (
              '<tg-emoji emoji-id="5368390346629932673">🚀</tg-emoji> <b>Мульти-компания полного цикла</b>\n'
              '100+ услуг — <u>только штатные специалисты</u>\n'
              '\n'
              '━━━━━━━━━━━━━━━━━━━━\n'
              '<blockquote><tg-emoji emoji-id="5370802009827458576">❌</tg-emoji> <b>Проблема 2026:</b>\n'
              'Сотни исполнителей, хаос цен, риск потерять бюджет</blockquote>\n'
              '\n'
              '<a href="https://t.me/Keis_Marketing_bot?start=price">🔸</a> <b>Вариант 1:</b> платишь 5 000₽ — теряешь 30 000₽\n'
              '<a href="https://t.me/Keis_Marketing_bot?start=price">🔸</a> <b>Вариант 2:</b> платишь 30 000₽ — <b>те же риски</b>\n'
              '\n'
              '<tg-emoji emoji-id="5370801796219403436">✅</tg-emoji> <b>Наш подход:</b> минимум цены, максимум качества\n'
              '\n'
              '━━━━━━━━━━━━━━━━━━━━\n'
              '<a href="https://t.me/Keis_Marketing_bot?start=price">🧩</a> <b>Экспертиза:</b> SEO, соцсети, маркетплейсы, реклама, сайты, CRM, боты, Mini App (<tg-spoiler><a href="https://t.me/Keis_Marketing_bot?start=price">TG/VK</a></tg-spoiler>), ИИ, аналитика, креатив, рассылки, накрутка, аккаунты — '
              '<a href="https://t.me/Keis_Marketing_bot?start=price">под ключ</a>.\n'
              '\n'
              '<tg-emoji emoji-id="5370731781878000210">💎</tg-emoji> <b>Хотите быстрый расчёт под ваш проект?</b> <tg-emoji emoji-id="5370810310421978893">👇</tg-emoji>'
          )

          keyboard = {
              "inline_keyboard": [
                  [{
                      "text": "⚡️ Узнать цены 🔥",
                      "url": "https://t.me/Keis_Marketing_bot?start=price",
                      "style": "success",
                      "has_shine_effect": true   # <-- анимация при нажатии
                  }]
              ]
          }

          payload = {
              "chat_id": CHAT_ID,
              "text": text,
              "parse_mode": "HTML",
              "disable_web_page_preview": True,
              "reply_markup": keyboard
          }

          req = urllib.request.Request(
              f"{BASE}/sendMessage",
              data=json.dumps(payload).encode("utf-8"),
              headers={"Content-Type": "application/json"}
          )
          with urllib.request.urlopen(req) as resp:
              result = json.loads(resp.read().decode())
              if not result.get("ok"):
                  print("Ошибка:", result)
                  sys.exit(1)
              msg_id = result["result"]["message_id"]
              print("✅ Пост отправлен, id:", msg_id)

          # Закрепление
          pin_payload = {
              "chat_id": CHAT_ID,
              "message_id": msg_id,
              "disable_notification": False
          }
          req = urllib.request.Request(
              f"{BASE}/pinChatMessage",
              data=json.dumps(pin_payload).encode("utf-8"),
              headers={"Content-Type": "application/json"}
          )
          with urllib.request.urlopen(req) as resp:
              pin_res = json.loads(resp.read().decode())
              if pin_res.get("ok"):
                  print("📌 Пост закреплён!")
              else:
                  print("Ошибка закрепления:", pin_res)
                  sys.exit(1)
          PYEOF
