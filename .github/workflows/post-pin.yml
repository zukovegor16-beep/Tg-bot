      ехала import os, json, urllib.request, sys

TOKEN = os.environ["RAW_TOKEN"].strip()
CHAT_ID = os.environ["RAW_CHAT_ID"].strip()
BASE = f"https://api.telegram.org/bot{TOKEN}"

# Текст для подписи к фото (caption)
caption = (
    '<tg-emoji emoji-id="5445284980978621387">🚀</tg-emoji> <b>Реклама услуг по выкупу и доставке из Китая</b>\n'
    '━━━━━━━━━━━━━━━━━━━━\n'
    '<blockquote><tg-emoji emoji-id="5465665476971471368">❌</tg-emoji> <b>Проблема:</b>\n'
    'Профиль в Instagram с малым числом подписчиков. Цель – стабильно получать от 5 лидов в день при бюджете $20, но стоимость лида была высокой, а охваты не росли.</blockquote>\n'
    '━━━━━━━━━━━━━━━━━━━━\n'
    '<tg-emoji emoji-id="5427009714745517609">✅</tg-emoji> <b>Что сделали:</b>\n'
    'Запустили таргетированную рекламу с детальной сегментацией аудитории, оформили креативы с реальными кейсами доставки, оптимизировали воронку.\n'
    '━━━━━━━━━━━━━━━━━━━━\n'
    '<tg-emoji emoji-id="5427009714745517609">✅</tg-emoji> <b>Результат за 7 дней:</b>\n'
    '• 4 500 подписчиков\n'
    '• 68 целевых лидов\n'
    '• $1,65 за лид / $0,45 за переход\n'
    '━━━━━━━━━━━━━━━━━━━━\n'
    '<tg-emoji emoji-id="5427009714745517609">✅</tg-emoji> <b>В планах:</b>\n'
    '10 000 подписчиков и 100 лидов/нед при $1,00 за лид\n'
    '━━━━━━━━━━━━━━━━━━━━\n'
    '<tg-emoji emoji-id="5235630047959727475">💎</tg-emoji> <b>Хотите так же?</b> <tg-emoji emoji-id="5470177992950946662">👇</tg-emoji>\n'
    '#ТаргетИнст'
)

# Кнопка "Хочу так же"
keyboard = {
    "inline_keyboard": [[{
        "text": "📈 Хочу так же ✅",
        "url": "https://t.me/Keis_Marketing_bot?start=target",
        "style": "success",
        "has_shine_effect": True
    }]]
}

# Параметры отправки фото
payload = {
    "chat_id": CHAT_ID,
    "photo": "https://litter.catbox.moe/0xs1d5.jpeg",  # Твоя ссылка
    "caption": caption,
    "parse_mode": "HTML",
    "reply_markup": keyboard
}

req = urllib.request.Request(
    f"{BASE}/sendPhoto",
    data=json.dumps(payload).encode("utf-8"),
    headers={"Content-Type": "application/json"}
)

try:
    with urllib.request.urlopen(req) as resp:
        result = json.loads(resp.read().decode())
    if result.get("ok"):
        msg_id = result["result"]["message_id"]
        print(f"✅ Пост с фото отправлен, id: {msg_id}")
    else:
        print("Ошибка отправки:", result)
        sys.exit(1)
except urllib.error.HTTPError as e:
    error_body = e.read().decode()
    print(f"Ошибка API: {e.code} {e.reason}")
    print("Ответ:", error_body)
    sys.exit(1)
