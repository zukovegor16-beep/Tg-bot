name: Анимированная витрина (обычные эмодзи)

on:
  workflow_dispatch:

jobs:
  send-and-pin:
    runs-on: ubuntu-latest
    steps:
      - name: Отправка и закрепление
        env:
          RAW_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          RAW_CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          python3 << 'PYEOF'
          import os, json, urllib.request, sys

          TOKEN = os.environ["RAW_TOKEN"].strip()
          CHAT_ID = os.environ["RAW_CHAT_ID"].strip()
          BASE = f"https://api.telegram.org/bot{TOKEN}"

          text = (
              '🚀 <b>Мульти-компания полного цикла</b>\n'
              '100+ услуг — <u>только штатные специалисты</u>\n'
              '\n'
              '━━━━━━━━━━━━━━━━━━━━\n'
              '<blockquote>❌ <b>Проблема 2026:</b>\n'
              'Сотни исполнителей, хаос цен, риск потерять бюджет</blockquote>\n'
              '\n'
              '🔸 <b>Вариант 1:</b> платишь 5 000₽ — теряешь 30 000₽\n'
              '🔸 <b>Вариант 2:</b> платишь 30 000₽ — <b>те же риски</b>\n'
              '\n'
              '✅ <b>Наш подход:</b> минимум цены, максимум качества\n'
              '\n'
              '━━━━━━━━━━━━━━━━━━━━\n'
              '🧩 <b>Экспертиза:</b> SEO, соцсети, маркетплейсы, реклама, сайты, CRM, боты, Mini App (<tg-spoiler>TG/VK</tg-spoiler>), ИИ, аналитика, креатив, рассылки, накрутка, аккаунты — '
              '<a href="https://t.me/Keis_Marketing_bot?start=price">под ключ</a>.\n'
              '\n'
              '💎 <b>Хотите расчёт под ваш проект?</b> 👇'
          )

          keyboard = {
              "inline_keyboard": [
                  [{"text": "⚡️ Рассчитать цену ✅", "url": "https://t.me/Keis_Marketing_bot?start=price"}]
              ]
          }

          payload = {
              "chat_id": CHAT_ID,
              "text": text,
              "parse_mode": "HTML",
              "disable_web_page_preview": True,
              "reply_markup": keyboard
          }

          # Отправка
          req = urllib.request.Request(
              f"{BASE}/sendMessage",
              data=json.dumps(payload).encode("utf-8"),
              headers={"Content-Type": "application/json"}
          )
          with urllib.request.urlopen(req) as resp:
              result = json.loads(resp.read().decode())
              if not result.get("ok"):
                  print("Ошибка отправки:", result)
                  sys.exit(1)
              msg_id = result["result"]["message_id"]
              print("✅ Пост опубликован, id:", msg_id)

          # Закрепление
          pin_payload = {
              "chat_id": CHAT_ID,
              "message_id": msg_id,
              "disable_notification": False
          }
          req = urllib.request.Request(
              f"{BASE}/pinChatMessage",
              data=json.dumps(pin_payload).encode("utf-8"),
              headers={"Content-Type": "application/json"}
          )
          with urllib.request.urlopen(req) as resp:
              pin_res = json.loads(resp.read().decode())
              if pin_res.get("ok"):
                  print("📌 Пост закреплён!")
              else:
                  print("Ошибка закрепления:", pin_res)
                  sys.exit(1)
          PYEOF
