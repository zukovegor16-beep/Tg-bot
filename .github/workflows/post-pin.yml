name: Отладка и отправка поста

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Проверка подключения и отправка
        env:
          TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          python3 << 'PYEOF'
          import os, json, urllib.request, sys

          TOKEN = os.environ["TOKEN"]
          CHAT_ID = os.environ["CHAT_ID"]
          BASE = f"https://api.telegram.org/bot{TOKEN}"

          # Сначала проверяем соединение и валидность токена
          try:
              with urllib.request.urlopen(f"{BASE}/getMe") as resp:
                  me = json.loads(resp.read().decode())
                  print("✅ Бот подключён:", me)
          except Exception as e:
              print("❌ Ошибка подключения к Telegram API:", e)
              sys.exit(1)

          # Проверяем, что бот видит чат
          try:
              with urllib.request.urlopen(f"{BASE}/getChat?chat_id={CHAT_ID}") as resp:
                  chat = json.loads(resp.read().decode())
                  print("✅ Информация о чате:", chat)
          except Exception as e:
              print("❌ Ошибка доступа к чату:", e)
              print("👉 Возможно, бот не добавлен в группу или chat_id неверный.")
              sys.exit(1)

          # Текст поста (упрощённый для отладки)
          text = "🚀 Тестовое сообщение витрины. Если увидели — всё работает!"
          keyboard = {
              "inline_keyboard": [
                  [{"text": "🔥 ОТКРЫТЬ ВИТРИНУ КЕЙСОВ", "url": "https://t.me/Keis_Marketing_bot?start=pin"}]
              ]
          }

          payload = {
              "chat_id": CHAT_ID,
              "text": text,
              "parse_mode": "HTML",
              "disable_web_page_preview": True,
              "reply_markup": keyboard
          }

          print("Отправляем...")
          try:
              req = urllib.request.Request(
                  f"{BASE}/sendMessage",
                  data=json.dumps(payload).encode("utf-8"),
                  headers={"Content-Type": "application/json"}
              )
              with urllib.request.urlopen(req) as resp:
                  result = json.loads(resp.read().decode())
                  print("📨 Ответ Telegram:", json.dumps(result, ensure_ascii=False, indent=2))
                  if not result.get("ok"):
                      print("❌ Telegram вернул ошибку.")
                      sys.exit(1)
                  message_id = result["result"]["message_id"]
                  print("✅ Сообщение отправлено, message_id =", message_id)
          except Exception as e:
              print("❌ Ошибка при отправке:", e)
              sys.exit(1)

          # Закрепление
          pin_payload = {
              "chat_id": CHAT_ID,
              "message_id": message_id,
              "disable_notification": False
          }
          try:
              req = urllib.request.Request(
                  f"{BASE}/pinChatMessage",
                  data=json.dumps(pin_payload).encode("utf-8"),
                  headers={"Content-Type": "application/json"}
              )
              with urllib.request.urlopen(req) as resp:
                  pin_result = json.loads(resp.read().decode())
                  print("📌 Ответ закрепления:", json.dumps(pin_result, ensure_ascii=False, indent=2))
                  if not pin_result.get("ok"):
                      print("❌ Не удалось закрепить.")
                      sys.exit(1)
                  print("🎉 Пост успешно закреплён!")
          except Exception as e:
              print("❌ Ошибка при закреплении:", e)
              sys.exit(1)
          PYEOF
